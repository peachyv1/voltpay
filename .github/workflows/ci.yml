name: Volt Pay CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Soroban CLI
        run: |
          cargo install --locked soroban-cli --version 20.0.0-rc.4 || echo "CLI already installed"

      - name: Build Contracts
        run: make build-contracts

      - name: Run Contract Tests
        run: make test

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          cd frontend
          npm install
          npm rebuild @tailwindcss/oxide

      - name: Build Frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_POOL_CONTRACT_ADDRESS: CCQZXG3QGFPLRS6LJJ4XALJGUGVNLISYN6BJSVOH57ED6FYJH7KGKXAR
          NEXT_PUBLIC_TOKEN_CONTRACT_ADDRESS: CCHLK4RHSS27U4K6VRIP6QW2N5IGBJJES4GA4CI3RRUGP54G4FH5HL7P
          NEXT_PUBLIC_VOLT_ISSUER: GAUTO5A... # Dummy
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
